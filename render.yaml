services:
  - type: web
    name: devonix-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: NVIDIA_API_KEY
        scope: build
        sync: false

